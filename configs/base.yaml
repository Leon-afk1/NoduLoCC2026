seed: 42
task: classification

data:
  dataset_root: ../nodulocc_dataset
  classification:
    labels_csv: classification_labels.csv
    images_subdir: nih_filtered_images
  val_size: 0.2
  split_dir: artifacts/splits

validation:
  mode: holdout       # holdout | kfold
  k: 5                # used only when mode=kfold
  fold_index: 0       # used by eval/predict in kfold mode

model:
  backbone: tf_efficientnet_b0.ns_jft_in1k
  pretrained: true
  dropout: 0.1

train:
  device: auto
  batch_size: 16
  num_workers: 0
  epochs: 4
  lr: 0.0002
  weight_decay: 0.0001
  img_size: 512
  use_weighted_sampler: true
  full_data: false    # true => train once on 100% data without validation
  output_dir: artifacts/checkpoints

eval:
  threshold: 0.5

tracking:
  enabled: true
  provider: wandb
  project: nodulocc
  entity: null
  group: null
  auto_run_name: true
  run_name_prefix: null
  run_name: null
  tags: []
  log_data_exploration: true
  data_samples_per_run: 8
  log_artifacts: true
  log_confusion_matrix: true
  log_curves: true
  log_prob_histograms: true
  log_prediction_table: true
  prediction_table_max_rows: 2000
  log_eval_runs: true
  log_predict_runs: true

sweep:
  n_trials: 10
  direction: maximize
  epochs_per_trial: 2
