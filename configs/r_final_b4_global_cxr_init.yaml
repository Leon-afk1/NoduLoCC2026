base_config: r_final_b4_global_deadline.yaml
task: classification

model:
  type: global
  # Set a backbone compatible with your external checkpoint.
  # TorchXRayVision resnet50-res512-all -> timm resnet50.
  backbone: resnet50
  pretrained: false
  init_checkpoint: artifacts/pretrained/xrv_resnet50_res512_all_init.pt
  init_ignore_head: true
  init_strip_prefixes: ["module."]
  init_add_prefix: auto

tracking:
  group: final_b4_global_cxr_init
