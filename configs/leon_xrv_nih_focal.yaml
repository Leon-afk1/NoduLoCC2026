base_config: base.yaml
task: classification

model:
  backbone: xrv:densenet121-res224-nih   # pré-entraîné sur NIH ChestX-ray14
  pretrained: true
  dropout: 0.3
  use_cbam: false   # poids aléatoires perturbent les features XRV

data:
  normalization:
    enabled: false  # XRVBackbone gère sa propre normalisation en interne
  preprocessing:
    profile: team_v2
    team_v2:
      use_thorax_mask: true
      use_clahe: true

train:
  epochs: 60
  batch_size: 24
  loss:
    name: bce
    use_pos_weight: true   
  grad_clip: 1.0           
  layer_wise_lr: true
  lr_backbone: 0.0001
  lr_head: 0.001
  early_stopping:
    enabled: true
    patience: 12
    min_delta: 0.001
    start_epoch: 20
  output_dir: artifacts/checkpoints/leon_xrv_nih_bce

eval:
  threshold: 0.30          
  auto_threshold_search: true

tracking:
  group: leon_xrv_nih_bce_v1
